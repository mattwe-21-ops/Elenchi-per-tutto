<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cose da Portare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎒 Cose da Portare</h1>
        
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Es. Spazzolino, Caricabatterie...">
            <button id="addBtn">Aggiungi</button>
        </div>

        <div class="controls">
            <label>Stile elenco:</label>
            <button class="style-btn active" data-style="square">Quadrati</button>
            <button class="style-btn" data-style="circle">Cerchi</button>
        </div>

        <ul id="travelList" class="list-square"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
