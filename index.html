<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cose da Portare PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎒 Cose da Portare</h1>
        
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Es. Passaporto, Costume...">
            <button id="addBtn">Aggiungi</button>
        </div>

        <div class="toolbar">
            <div class="control-group">
                <label>Punti elenco:</label>
                <button class="style-btn active" data-style="square">■ Quadrati</button>
                <button class="style-btn" data-style="circle">● Cerchi</button>
            </div>
        </div>

        <ul id="travelList" class="list-square"></ul>

        <div class="export-zone">
            <h3>💾 Gestione ed Esportazione</h3>
            <div class="action-buttons">
                <button id="exportTxtBtn" class="btn-secondary">Download .TXT</button>
                <button id="copyBtn" class="btn-secondary">Copia negli Appunti</button>
                <button id="clearAllBtn" class="btn-danger">Svuota Lista</button>
            </div>
            
            <div class="import-group">
                <label for="importFile" class="custom-file-upload">📂 Importa da file .txt</label>
                <input type="file" id="importFile" accept=".txt">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
