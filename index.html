<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Bagaglio - Professionale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="no-print">
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Aggiungi qualcosa alla lista...">
            <button class="btn-add" id="btnAdd">AGGIUNGI</button>
        </div>
        
        <div class="style-selector">
            <button id="btnSquare" class="active"><i class="far fa-square"></i> Quadrati Grandi</button>
            <button id="btnCircle"><i class="far fa-circle"></i> Cerchi Grandi</button>
        </div>

        <div class="export-btns">
            <button class="btn-export btn-word" id="btnWord"><i class="far fa-file-word"></i> Esporta in Word (.doc)</button>
            <button class="btn-export btn-pdf" id="btnPrint"><i class="fas fa-print"></i> Stampa Foglio A4</button>
            <button class="btn-export btn-clear" id="btnClear"><i class="fas fa-trash-alt"></i> Svuota Tutto</button>
        </div>
    </div>

    <div class="page" id="printableContent">
        <header>
            <h1>Lista Cose da Portare</h1>
            <div class="meta-info">
                <span id="currentDate"></span>
                <span>Documento: Baggage-List-PRO</span>
            </div>
        </header>

        <div class="index-box">
            <div class="index-title">Indice Contenuti / Stato Avanzamento</div>
            <div id="statsText">0 elementi totali - 0 completati</div>
        </div>

        <ul id="listContainer" class="list-square"></ul>

        <footer>
            <span>© Sistema Gestione Bagaglio Professionale</span>
            <span>Pagina 1 di 1</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
